spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ticketbox
    username: ticketbox
    password: replace-with-local-postgres-password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ticketbox
    password: replace-with-local-rabbitmq-password

ticketbox:
  security:
    jwt-secret-placeholder: replace-with-local-development-only-secret
