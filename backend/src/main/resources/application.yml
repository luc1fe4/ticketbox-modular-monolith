spring:
  application:
    name: ticketbox-api
  profiles:
    default: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: ${GUEST_LIST_MAX_FILE_SIZE:10MB}
      max-request-size: ${GUEST_LIST_MAX_REQUEST_SIZE:11MB}
  modulith:
    detection-strategy: explicitly-annotated
  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    protocol: smtp
    default-encoding: UTF-8
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 500ms
          multiplier: 2
          max-attempts: 3
          max-interval: 2s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      vnpay:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
      momo:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
      artistBioAi:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2

ticketbox:
  orders:
    expiration:
      fixed-delay-ms: 60000
  payment:
    mock:
      base-url: ${PAYMENT_MOCK_BASE_URL:http://localhost:8080}
    vnpay:
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/result}
      ipn-url: ${VNPAY_IPN_URL:}
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      locale: vn
      order-type: other
    momo:
      api-endpoint: ${MOMO_API_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      partner-code: ${MOMO_PARTNER_CODE:}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      return-url: ${MOMO_RETURN_URL:http://localhost:5173/payment/result}
      ipn-url: ${MOMO_IPN_URL:}
  rate-limit:
    purchase:
      capacity: 5
      refill-tokens: 1
      refill-period: 2s
    payment:
      capacity: 3
      refill-tokens: 1
      refill-period: 5s
  notifications:
    reminder:
      fixed-delay-ms: 300000
  guest-list:
    root-dir: ${GUEST_LIST_ROOT_DIR:./data/guest-list}
    cron: ${GUEST_LIST_IMPORT_CRON:0 */5 * * * *}
    max-file-size: ${GUEST_LIST_MAX_FILE_SIZE:10MB}
    stable-age: ${GUEST_LIST_STABLE_AGE:30s}
  ai:
    provider: ${ARTIST_BIO_AI_PROVIDER:auto}
    base-url: ${ARTIST_BIO_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${ARTIST_BIO_AI_API_KEY:}
    model: ${ARTIST_BIO_AI_MODEL:gpt-4o-mini}
    timeout: ${ARTIST_BIO_AI_TIMEOUT:30s}
    max-input-characters: ${ARTIST_BIO_MAX_INPUT_CHARACTERS:30000}
    max-file-size: ${ARTIST_BIO_MAX_FILE_SIZE:10MB}
    max-pages: ${ARTIST_BIO_MAX_PAGES:50}
    storage-root: ${ARTIST_BIO_STORAGE_ROOT:./data/artist-bio}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_POSTER_FOLDER:ticketbox/concert-posters}
    max-file-size: ${CLOUDINARY_MAX_FILE_SIZE:5MB}
