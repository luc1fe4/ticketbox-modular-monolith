spring:
  application:
    name: ticketbox-api
  profiles:
    default: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
  modulith:
    detection-strategy: explicitly-annotated
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 500ms
          multiplier: 2
          max-attempts: 3
          max-interval: 2s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

ticketbox:
  rate-limit:
    purchase:
      capacity: 5
      refill-tokens: 1
      refill-period: 2s
    payment:
      capacity: 3
      refill-tokens: 1
      refill-period: 5s

